name: CI/CD Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
    types: [opened, synchronize]

jobs:
  ci-build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      TEST_MONGODB_URI: mongodb://localhost:27017/art_club_test
      SECRET: ${{ secrets.SECRET }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Check style
        run: npm run lint

      - name: Run tests
        run: npm test -- --forceExit

      - name: Security audit
        run: npm audit --audit-level=high

  docker-publish:
    needs: [ci-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Hae frontin tuore build-artifact frontend-reposta
      - name: Download frontend build
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.BACKEND_REPO_TOKEN }}
          repo: vsvala/Art_Club
          workflow: ci.yml
          name: frontend-build
          path: build/

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/vsvala/artclub-backend:latest

  deploy:
    needs: [ci-build-and-test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push' && !contains(github.event.head_commit.message, '#skip')
    steps:
      - name: Trigger Render deploy
        run: curl --fail -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      - name: Health check
        run: |
          echo "Waiting for deployment to be ready..."
          sleep 30
          curl --fail --retry 10 --retry-delay 15 --retry-connrefused \
            --max-time 10 --connect-timeout 5 \
            ${{ secrets.RENDER_APP_URL }}/api/healt
  # Rollback is done manually from render.com UI--> Rollback to this deploy
  # --- Vaihe : Tag release ---
  # Luo automaattisesti uuden patch-version tagin onnistuneen deployn jälkeen
  tag_release:
    needs: [ci-build-and-test, deploy]
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/master' &&
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '#skip')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
